name: Validate repository

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: virtualauto-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Python and repository (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install VirtualAuto
        run: python -m pip install --disable-pip-version-check -e .

      - name: Compile Python entry points
        run: python -m compileall -q src scripts tests blender/scripts

      - name: Run unit and repository tests
        run: python -m unittest discover -s tests -v

      - name: Regenerate retrieval index through packaged command
        run: virtualauto build-index

      - name: Verify retrieval index is current
        run: git diff --exit-code -- generated/automotive_master.index.json

      - name: Run strict repository validator through packaged command
        run: virtualauto validate
