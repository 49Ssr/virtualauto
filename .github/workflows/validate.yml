name: Validate repository

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

concurrency:
  group: virtualauto-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Python and repository (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install VirtualAuto
        run: python -m pip install --disable-pip-version-check -e .

      - name: Compile Python entry points
        run: python -m compileall -q src dev/scripts dev/tests workflows/blender/scripts

      - name: Run unit and repository tests
        run: python -m unittest discover -s dev/tests -v

      - name: Regenerate retrieval index through packaged command
        run: virtualauto build-index

      - name: Verify retrieval index is current
        run: git diff --exit-code -- research/indexes/automotive_master.index.json

      - name: Run strict repository validator through packaged command
        run: virtualauto validate

  driveclubfs-build:
    name: Pinned DriveClubFS build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository and pinned instruments
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up .NET 9
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "9.0.x"

      - name: Install VirtualAuto
        run: python -m pip install --disable-pip-version-check -e .

      - name: Build the exact pinned DriveClubFS source
        run: virtualauto driveclub build

      - name: Verify the published command starts
        run: dotnet build/external/DriveClubFS/DriveClubFS.dll --help
