name: Validate repository

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: virtualauto-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Structure, schemas, references, and policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-validation.txt

      - name: Regenerate retrieval index
        run: python scripts/build_master_index.py

      - name: Verify retrieval index is current
        run: git diff --exit-code -- generated/automotive_master.index.json

      - name: Run repository validator
        env:
          VIRTUALAUTO_STRICT_VALIDATION: "1"
        run: python scripts/validate_repository.py
